# --- Redirects: make apex the canonical host and force HTTPS ---

# 1) HTTP apex -> HTTPS apex
[[redirects]]
from = "http://itsnotcominghome.com/*"
to = "https://itsnotcominghome.com/:splat"
status = 301
force = true

# 2) HTTP www -> HTTPS apex
[[redirects]]
from = "http://www.itsnotcominghome.com/*"
to = "https://itsnotcominghome.com/:splat"
status = 301
force = true

# 3) HTTPS www -> HTTPS apex (canonical host)
[[redirects]]
from = "/*"
to = "https://itsnotcominghome.com/:splat"
status = 301
force = true
conditions = { Host = ["www.itsnotcominghome.com"] }

# --- Sensible security headers for all routes ---

[[headers]]
for = "/*"
[headers.values]
  Referrer-Policy = "strict-origin-when-cross-origin"
  X-Content-Type-Options = "nosniff"
  X-Frame-Options = "DENY"
  # Opt-out of powerful features by default; loosen later if you need them
  Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
